<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯电动汽车 (BEV) 深度学习 - 车辆技术学习平台</title>
    <style>
        :root {
            --bev-color: #2563eb;
            --bev-light: #3b82f6;
            --bev-dark: #1d4ed8;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 顶部导航 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .nav-brand a {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .nav-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .nav-current {
            color: var(--bev-color);
            font-weight: 600;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: var(--bev-color);
            color: white;
        }
        
        /* 面包屑导航 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            color: var(--bev-color);
        }
        
        .breadcrumb-separator {
            color: var(--border-color);
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 50px 30px;
            background: linear-gradient(135deg, var(--bev-dark) 0%, var(--bev-color) 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 800;
        }
        
        .page-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        /* 学习工具栏 */
        .learning-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 2px solid var(--border-color);
        }
        
        .tools-left, .tools-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .tool-btn:hover {
            background: rgba(37, 99, 235, 0.2);
            color: var(--bev-color);
            border-color: var(--bev-color);
        }
        
        .progress-bar {
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--bev-color);
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        /* 侧边栏导航 */
        .learning-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .sidebar {
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        
        .sidebar-nav {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid var(--border-color);
        }
        
        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--bev-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-list {
            list-style: none;
        }
        
        .sidebar-item {
            margin-bottom: 12px;
        }
        
        .sidebar-link {
            display: block;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover {
            background: rgba(37, 99, 235, 0.1);
            color: var(--bev-color);
            border-left-color: var(--bev-color);
        }
        
        .sidebar-link.active {
            background: rgba(37, 99, 235, 0.2);
            color: var(--bev-color);
            border-left-color: var(--bev-color);
            font-weight: 600;
        }
        
        /* 学习笔记面板 */
        .notes-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid var(--border-color);
            margin-top: 20px;
        }
        
        .notes-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--bev-color);
        }
        
        .notes-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 10px;
        }
        
        .notes-textarea:focus {
            outline: none;
            border-color: var(--bev-color);
        }
        
        .notes-save {
            background: var(--bev-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .notes-save:hover {
            background: var(--bev-dark);
        }
        
        /* 学习内容区域 */
        .learning-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            border: 2px solid var(--border-color);
        }
        
        .learning-section {
            margin-bottom: 60px;
            scroll-margin-top: 20px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .section-icon {
            font-size: 2rem;
            color: var(--bev-color);
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* 内容卡片 */
        .content-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid var(--bev-color);
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--bev-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-content {
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .card-content ul {
            list-style: none;
            padding-left: 20px;
        }
        
        .card-content li {
            margin-bottom: 10px;
            position: relative;
        }
        
        .card-content li:before {
            content: '•';
            color: var(--bev-color);
            font-weight: bold;
            position: absolute;
            left: -20px;
        }
        
        /* 概念解释框 */
        .concept-box {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid var(--bev-color);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .concept-title {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--bev-color);
            font-size: 1.1rem;
        }
        
        /* 表格样式 */
        .tech-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .tech-table th {
            background: var(--bev-color);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        .tech-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .tech-table tr:last-child td {
            border-bottom: none;
        }
        
        .tech-table tr:hover {
            background: rgba(37, 99, 235, 0.1);
        }
        
        /* 知识要点 */
        .knowledge-points {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        .knowledge-card {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid var(--bev-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .knowledge-title {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--bev-color);
        }
        
        /* 交互式测试 */
        .quiz-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid var(--border-color);
        }
        
        .quiz-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--bev-color);
        }
        
        .quiz-question {
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .quiz-option:hover {
            background: rgba(37, 99, 235, 0.1);
            border-color: var(--bev-color);
        }
        
        .quiz-option.selected {
            background: rgba(37, 99, 235, 0.2);
            border-color: var(--bev-color);
            color: var(--bev-color);
        }
        
        .quiz-option.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success-color);
            color: var(--success-color);
        }
        
        .quiz-option.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger-color);
            color: var(--danger-color);
        }
        
        .quiz-feedback {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        .quiz-feedback.correct {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }
        
        .quiz-feedback.incorrect {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }
        
        .quiz-submit {
            background: var(--bev-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .quiz-submit:hover {
            background: var(--bev-dark);
        }
        
        /* 3D模型占位 */
        .model-placeholder {
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            margin: 20px 0;
        }
        
        .model-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        /* 知识图谱占位 */
        .knowledge-graph {
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            margin: 20px 0;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            border-top: 2px solid var(--border-color);
            margin-top: 60px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-link:hover {
            color: var(--text-primary);
        }
        
        .copyright {
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .
